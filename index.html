<!DOCTYPE html>
<html>
<head>
<title>My First Website</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  transition: background 0.3s, color 0.3s;
}

/* Dark mode style */
.dark {
  background: #0f172a;
  color: white;
}

/* Button style */
button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>Hello 👋</h1>
<p>This is my first website made with GitHub Pages!</p>

<button onclick="toggleDark()">Toggle Dark Mode 🌙</button>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
